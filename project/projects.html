<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommeleita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('/pics/pepehack.gif') no-repeat left center fixed; /* Set background image */
            background-size: contain; /* Adjust background image size */
        }
        header {
            background: none; /* Remove background */
            color: #fff;
            padding: 1rem;
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 2rem;
            color: #fff; /* Set text color to white */
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Align items to the right */
            margin-left: calc(30px + 200px + 50px); /* Move the container 30 pixels to the right plus the width of the pepehack.gif plus 50 pixels */
        }
        .project {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.5); /* Add semi-transparent background */
            width: 50%; /* Set width of project boxes */
        }
        .project h2, .project p {
            color: #fff; /* Set text color to white */
        }
        .homepage-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="homepage-link">Home</a>
        <h1>Projekteja</h1>
    </header>
    <div class="container">
        <div class="project">
            <h2>Projekti hammasstatus</h2>
            <p>Description: Hammaslääkärin "värityskirja" hampaistosta. Toimii javascriptillä.</p>
            <p>Linkki: <a href="https://teijjo.fi/project/hammasstatus/hammas.html">Pääset katsomaan sitä täällä!</a></p>
        </div>
        <div class="project">
            <h2>Project 2</h2>
            <p>Description: Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <p>GitHub: <a href="https://github.com/yourusername/project2">Project 2 Repository</a></p>
        </div>
        <!-- Add more projects as needed -->
    </div>
</body>
</html>
