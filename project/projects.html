<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommeleita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('/pics/pepehack.gif') no-repeat left center fixed; /* Set background image */
            background-size: auto;
            background-size: 35%;
            margin-top: 0; /* Remove the margin-top */
        }
        header {
            background: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            margin-top: 0; /* Remove the margin-top */
        }
        h1 {
            color: gray; /* Make the title gray */
            margin-top: 15px; /* Increase the margin-top to create a thicker gray bar */
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            color: #fff;
            margin-left: 630px; /* Move the container 630px to the right */
        }
        .project {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.5); /* Add semi-transparent background */
            width: 50%; /* Set width of project boxes */
            margin-left: 20px; /* Add margin to create space between project boxes */
        }
        .project h2, .project p {
            color: #fff; /* Set text color to white */
        }
        .homepage-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-right: 20px; /* Add margin to create space between "Home" link and header */
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="homepage-link">Kotivalikko</a>
        <h1>Projekteja</h1> <!-- Make the title gray -->
    </header>
    <div class="container">
        <div class="project">
            <h2>Projekti hammasstatus</h2>
            <p>Kuvaus: Hammaslääkärin "värityskirja" hampaistosta. Toimii javascriptillä.</p>
            <p>Linkki: <a href="https://teijjo.fi/project/hammasstatus/hammas.html">Pääset katsomaan sitä täällä!</a></p>
        </div>
        <div class="project">
            <h2>Muita projekteja 2</h2>
            <p>Kuvaus: Lisää omia hommeleita</p>
            <p>GitHub: <a href="https://github.com/teyo1/repositories">Project 2 Repository</a></p>
        </div>
        <!-- Add more projects as needed -->
    </div>
</body>
</html>
